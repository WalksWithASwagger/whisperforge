version: '3.8'

services:
  whisperforge:
    build: .
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - whisperforge_data:/app/data
    networks:
      - whisperforge-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - whisperforge
    networks:
      - whisperforge-net

networks:
  whisperforge-net:
    driver: bridge

volumes:
  whisperforge_data:
    driver: local